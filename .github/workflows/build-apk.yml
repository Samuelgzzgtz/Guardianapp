name: Build & Release APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create Secrets.kt
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_SERVICE_KEY }}
        run: |
          mkdir -p app/src/main/java/com/example/gab/data/remote
          printf 'package com.example.gab.data.remote\ninternal const val ADMIN_SERVICE_KEY = "%s"\n' "$ADMIN_KEY" \
            > app/src/main/java/com/example/gab/data/remote/Secrets.kt

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk GuardianAppBuilding.apk

      - name: Delete existing release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with APK
        run: |
          gh release create latest GuardianAppBuilding.apk \
            --title "GuardianApp — Build más reciente" \
            --notes "APK generado automáticamente desde la última versión de master." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
